---
name: Build Android APK/AAB

"on":
  push:
    branches: [main]
    paths:
      - 'src/**'
      - 'android/**'
      - 'package.json'
      - '.github/workflows/build-android.yml'
  workflow_dispatch:
    inputs:
      build_type:
        description: 'Build type'
        required: true
        default: 'aab'
        type: choice
        options:
          - apk
          - aab

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '22'

jobs:
  build-android:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Build web app
        run: npm run build
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_ANON_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}

      - name: Make gradlew executable
        run: chmod +x android/gradlew

      - name: Copy web assets to Android
        run: ./node_modules/.bin/cap copy android

      - name: Set ANDROID_KEYSTORE_BASE64 env
        run: |
          echo "::add-mask::${{ secrets.ANDROID_KEYSTORE_BASE64 }}"
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Decode Keystore
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | \
            base64 -d > android/app/keystore.jks
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}

      - name: Build Release AAB
        if: ${{ github.event.inputs.build_type == 'aab' || github.event.inputs.build_type == '' }}
        env:
          SIGN_STORE_PW: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          SIGN_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SIGN_KEY_PW: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          if [ -f "app/keystore.jks" ]; then
            SIGN_STORE=keystore.jks

            K1=android.injected.signing.store.file
            K2=android.injected.signing.store.password
            K3=android.injected.signing.key.alias
            K4=android.injected.signing.key.password

            echo "$K1=$SIGN_STORE" > signing.properties
            echo "$K2=$SIGN_STORE_PW" >> signing.properties
            echo "$K3=$SIGN_ALIAS" >> signing.properties
            echo "$K4=$SIGN_KEY_PW" >> signing.properties

            ./gradlew bundleRelease
          else
            ./gradlew bundleRelease
          fi

      - name: Build Release APK
        if: ${{ github.event.inputs.build_type == 'apk' }}
        env:
          SIGN_STORE_PW: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          SIGN_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          SIGN_KEY_PW: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          cd android
          if [ -f "app/keystore.jks" ]; then
            SIGN_STORE=keystore.jks

            K1=android.injected.signing.store.file
            K2=android.injected.signing.store.password
            K3=android.injected.signing.key.alias
            K4=android.injected.signing.key.password

            echo "$K1=$SIGN_STORE" > signing.properties
            echo "$K2=$SIGN_STORE_PW" >> signing.properties
            echo "$K3=$SIGN_ALIAS" >> signing.properties
            echo "$K4=$SIGN_KEY_PW" >> signing.properties

            ./gradlew assembleRelease
          else
            ./gradlew assembleRelease
          fi

      - name: Upload AAB
        if: ${{ github.event.inputs.build_type == 'aab' || github.event.inputs.build_type == '' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-aab
          path: android/app/build/outputs/bundle/release/*.aab
          retention-days: 30

      - name: Upload APK
        if: ${{ github.event.inputs.build_type == 'apk' }}
        uses: actions/upload-artifact@v4
        with:
          name: android-apk
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30

      - name: Set GOOGLE_PLAY_SERVICE_ACCOUNT_JSON env
        run: |
          echo "::add-mask::${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}"
        env:
          GOOGLE_PLAY_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}

      - name: Upload to Google Play (Internal Testing)
        if: ${{ env.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON != '' }}
        uses: r0adkll/upload-google-play@v1
        with:
          serviceAccountJsonPlainText: ${{ secrets.GOOGLE_PLAY_SERVICE_ACCOUNT_JSON }}
          packageName: com.islakayd.app
          releaseFiles: android/app/build/outputs/bundle/release/*.aab
          track: internal
          status: completed
